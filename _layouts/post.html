<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | Mohitraj Shah Portfolio</title>
  <meta name="description" content="{{ page.description }}">
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description }}">
  <meta property="og:image" content="{{ site.url }}{{ page.image }}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:type" content="article">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title }}">
  <meta name="twitter:description" content="{{ page.description }}">
  <meta name="twitter:image" content="{{ site.url }}{{ page.image }}">

  <!-- BlogPosting Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": "{{ page.title }}",
    "description": "{{ page.description }}",
    "image": "{{ site.url }}{{ page.image }}",
    "author": { "@type": "Person", "name": "{{ page.author }}" },
    "publisher": { "@type": "Organization", "name": "Mohitraj Shah Portfolio", "logo": { "@type": "ImageObject", "url": "{{ site.url }}/img.png" } },
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.date | date_to_xmlschema }}",
    "mainEntityOfPage": "{{ site.url }}{{ page.url }}"
  }
  </script>

  <!-- Breadcrumb Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Home", "item": "{{ site.url }}/" },
      { "@type": "ListItem", "position": 2, "name": "Blog", "item": "{{ site.url }}/blog/" },
      { "@type": "ListItem", "position": 3, "name": "{{ page.title }}" }
    ]
  }
  </script>
</head>
<body>
  {% include header.html %}
  
  <main>
    <nav aria-label="breadcrumb">
      <ol>
        <li><a href="{{ site.url }}/">Home</a></li>
        <li><a href="{{ site.url }}/blog/">Blog</a></li>
        <li>{{ page.title }}</li>
      </ol>
    </nav>

    <article>
      <h1>{{ page.title }}</h1>
      {{ content }}
    </article>
  </main>

  {% include footer.html %}
</body>
</html>
